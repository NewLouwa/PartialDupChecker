name: Partial Duplicate Checker
description: Finds duplicates Stash's whole-file phash misses - partial video matches (cuts, parts, montages) and near-duplicate images, plus auto-collecting similar images into galleries. Complements the built-in duplicate checker; never mutates the library unless you opt in.
version: 0.6.0
ui:
  javascript:
    - partialdup.js
  css:
    - partialdup.css
# exec[0] is `python` for prod (Alpine python3.12). On the local Windows test
# Stash, re-pin the deployed copy to the 3.11 interpreter, e.g.:
#   - C:/Users/Louis/AppData/Local/Programs/Python/Python311/python.exe
exec:
  - python
  - "{pluginDir}/partialdup.py"
interface: raw
tasks:
  # Native Stash Tasks (Settings > Tasks > Plugin Tasks). These run in-process so
  # Stash shows a progress bar and posts a completion notification. The plugin's
  # own page (nav: Partial Dup) runs scans via a detached worker instead.
  - name: "Scan videos for partial duplicates"
    description: "Fingerprint every scene and find cuts, parts and montages of videos you already have. Read-only: never deletes or edits anything. Review and act on the Partial Dup page (top nav)."
    defaultArgs:
      action: task_scan
  - name: "Scan images for duplicates and similar galleries"
    description: "Find near-duplicate images (keep one, flag the rest) and group visually-similar images. Gallery creation is dry-run by default - it only reports what it would create until you turn dry-run off. Review on the Partial Dup page."
    defaultArgs:
      action: task_scan_images
